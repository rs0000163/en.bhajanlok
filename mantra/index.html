/* ============ GLOBAL RESET + VARIABLES ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #1a2332;
    --accent: #c89853;
    --accent-dark: #8a4a0a;
    --maroon: #4a0e0e;
    --cream-soft: #fdf6e8;
    --text-dark: #1a2332;
    --text-muted: #6b7280;
    --bg-cream: #faf8f3;
    --bg-light: #ffffff;
    --border: #e5e0d3;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-cream);
    color: var(--text-dark);
    line-height: 1.6;
}

h1, h2, h3, .serif {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
}

.container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }

/* ============ CATEGORY HERO ============ */
.category-hero { padding: 0px 0 10px; text-align: center; }
.category-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: white; border: 1px solid var(--border);
    padding: 8px 20px; border-radius: 30px;
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 3px; margin-bottom: 32px;
    text-transform: uppercase;
}
.category-tag .icon { color: var(--accent); }
.category-title {
    font-size: 80px; line-height: 1.1;
    color: var(--text-dark); margin-bottom: 16px;
    font-weight: 500; font-family: 'Cormorant Garamond', serif;
}
.category-subtitle {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    color: var(--text-muted); font-style: italic;
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 22px; margin-bottom: 32px;
}
.category-subtitle::before, .category-subtitle::after {
    content: ''; width: 60px; height: 1px; background: var(--border);
}
.category-desc { font-size: 18px; color: var(--text-muted); max-width: 700px; margin: 0 auto; line-height: 1.7; }

/* ============ MANTRA CARDS ============ */
.cards-section { padding: 40px 0 20px; }
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }

.mantra-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 24px;
    cursor: pointer;
    position: relative;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
    display: flex; flex-direction: column;
    min-height: 380px;
    overflow: hidden;
}
.mantra-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
.mantra-card::before {
    content: '';
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 140px;
    height: 100px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 100'><g fill='%23c89853' opacity='0.35'><path d='M30,30 L32,38 L40,40 L32,42 L30,50 L28,42 L20,40 L28,38 Z'/><path d='M70,55 L72,62 L79,64 L72,66 L70,73 L68,66 L61,64 L68,62 Z'/><path d='M110,25 L111.5,30.5 L117,32 L111.5,33.5 L110,39 L108.5,33.5 L103,32 L108.5,30.5 Z'/><path d='M50,75 L51.5,80.5 L57,82 L51.5,83.5 L50,89 L48.5,83.5 L43,82 L48.5,80.5 Z'/><path d='M95,75 L96,79 L100,80 L96,81 L95,85 L94,81 L90,80 L94,79 Z'/></g></svg>");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    pointer-events: none;
}

.mantra-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(200, 152, 83, 0.15);
    color: var(--accent-dark);
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 20px; align-self: flex-start;
}

.mantra-text {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 20px; line-height: 1.7;
    color: var(--text-dark);
    margin-bottom: 20px;
    position: relative; padding-left: 18px;
}
.mantra-text::before {
    content: '❝'; position: absolute;
    left: -4px; top: -10px; font-size: 32px;
    color: var(--accent); font-family: serif; line-height: 1;
}

.mantra-meaning {
    font-style: italic; color: var(--text-muted);
    font-size: 14px; line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid var(--border);
    margin-bottom: 24px;
}

.mantra-footer {
    margin-top: auto; padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 1;
}

.mantra-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 18px;
    color: var(--text-dark);
}

.read-arrow {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--cream-soft); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dark); font-size: 14px;
    transition: all 0.3s;
    position: relative; overflow: hidden; flex-shrink: 0;
}
.read-arrow .arrow-icon { transition: transform 0.3s; }
.read-arrow .read-label {
    position: absolute; background: var(--text-dark); color: white;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    border-radius: 50%; opacity: 0; transition: opacity 0.3s;
}
.mantra-card:hover .read-arrow {
    background: var(--text-dark); color: white;
    border-color: var(--text-dark); transform: scale(1.1);
}
.mantra-card:hover .read-arrow .read-label { opacity: 1; }
.mantra-card:hover .read-arrow .arrow-icon { transform: translateX(50px); opacity: 0; }

/* ============ MODAL ============ */
.modal-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100vh;
    background: rgba(74, 14, 14, 0.5);
    backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
    opacity: 0; transition: opacity 0.3s;
}
.modal-overlay.active { display: flex; opacity: 1; }

.modal {
    background: white; border-radius: 20px;
    max-width: 720px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    transform: scale(0.95); transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: scale(1); }

.modal-header {
    padding: 32px 36px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 20px;
}
.modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 600;
    color: var(--maroon); margin-bottom: 6px;
    line-height: 1.2;
}
.modal-category {
    font-size: 12px; letter-spacing: 2px;
    color: var(--accent-dark); font-weight: 700;
    text-transform: uppercase;
}
.modal-close {
    background: #f0ebe1; border: none;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; font-size: 18px;
    color: var(--text-dark);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; flex-shrink: 0;
}
.modal-close:hover { background: var(--text-dark); color: white; transform: rotate(90deg); }

.modal-body { padding: 32px 36px; background: var(--cream-soft); }

.modal-mantra-box {
    background: white; border-radius: 16px;
    padding: 40px 30px; text-align: center;
    margin-bottom: 24px;
}
.modal-mantra-text {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 30px; line-height: 1.6;
    color: var(--maroon);
}

.modal-meaning-box {
    background: white; border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 16px;
}
.modal-meaning-box:last-of-type { margin-bottom: 0; }

.modal-meaning-title {
    display: flex; align-items: center; gap: 10px;
    color: var(--maroon); font-weight: 700;
    font-size: 16px; margin-bottom: 14px;
}
.modal-meaning-title .lang-tag {
    background: var(--accent); color: white;
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 10px;
    margin-left: auto; font-weight: 700;
}
.modal-meaning-text {
    color: var(--text-dark);
    font-size: 15px; line-height: 1.8;
}
.modal-meaning-text.hindi {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 16px; line-height: 1.9;
}

.modal-footer { padding: 24px 36px 32px; }
.btn-copy {
    width: 100%; background: var(--maroon);
    color: var(--accent); border: none;
    padding: 16px; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 10px; transition: all 0.3s; font-family: inherit;
}
.btn-copy:hover { background: #2d0808; transform: translateY(-2px); }
.btn-copy.copied { background: #2d5016; color: white; }

/* ============ RESPONSIVE ============ */
@media (max-width: 1200px) {
    .container { padding: 0 40px; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
}
@media (max-width: 1024px) {
    .container { padding: 0 80px; }
    .category-hero { padding: 50px 0 30px; }
    .category-title { font-size: 60px; }
    .category-subtitle { font-size: 18px; }
    .category-desc { font-size: 16px; }
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
}
@media (max-width: 768px) {
    .container { padding: 0 30px; }
    .category-hero { padding: 30px 0 20px; }
    .category-title { font-size: 40px; }
    .category-tag { font-size: 10px; letter-spacing: 2px; padding: 6px 14px; margin-bottom: 24px; }
    .category-subtitle { font-size: 16px; gap: 12px; }
    .category-subtitle::before, .category-subtitle::after { width: 40px; }
    .category-desc { font-size: 15px; }
    .cards-section { padding: 30px 0 60px; }
    .cards-grid { grid-template-columns: 1fr; gap: 16px; }
    .mantra-card { min-height: auto; padding: 24px 20px; }
    .mantra-text { font-size: 20px; }
    .modal-header { padding: 24px 24px 20px; }
    .modal-title { font-size: 24px; }
    .modal-body { padding: 24px; }
    .modal-mantra-box { padding: 28px 20px; }
    .modal-mantra-text { font-size: 22px; }
    .modal-footer { padding: 20px 24px 28px; }
}
@media (max-width: 480px) {
    .container { padding: 0 16px; }
    .category-title { font-size: 32px; }
    .category-subtitle { font-size: 14px; }
    .category-desc { font-size: 14px; }
}

.toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-dark); color: white;
    padding: 14px 28px; border-radius: 30px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2000;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

        categoryEN: "Devotion",
        categoryHI: "भक्ति",
        text: "त्वमेव माता च पिता त्वमेव\nत्वमेव बन्धुश्च सखा त्वमेव ।\nत्वमेव विद्या द्रविणं त्वमेव\nत्वमेव सर्वं मम देव देव ॥",
        meaningEN: "You alone are my mother and father. You alone are my friend and companion. You alone are knowledge and wealth. You alone are everything, O Lord of Lords.",
        meaningHI: "तू ही मेरी माता और पिता है। तू ही मेरा मित्र और साथी है। तू ही विद्या और धन है। हे देवों के देव, तू ही मेरा सब कुछ है।"
    }
];

// UI text — only difference between EN and HI pages
const UI = {
    en: { read: 'READ', copyBtn: 'COPY MANTRA', copiedBtn: 'COPIED!', toastCopy: 'Mantra copied to clipboard!' },
    hi: { read: 'पढ़ें', copyBtn: 'मंत्र कॉपी करें', copiedBtn: 'कॉपी हो गया!', toastCopy: 'मंत्र कॉपी हो गया!' }
};

function renderCards() {
    const grid = document.getElementById('mantraGrid');
    grid.innerHTML = mantras.map((m, i) => {
        const name = LANG === 'en' ? m.nameEN : m.nameHI;
        const category = LANG === 'en' ? m.categoryEN : m.categoryHI;
        // Preview meaning in page language
        const previewMeaning = LANG === 'en'
            ? m.meaningEN.split('.')[0] + '.'
            : m.meaningHI.split('।')[0] + '।';
        const maxLen = LANG === 'en' ? 22 : 18;
        const displayName = name.length > maxLen ? name.substring(0, maxLen - 2) + '...' : name;
        return `
        <div class="mantra-card" onclick="openModal(${i})">
            <span class="mantra-badge"><i class="fa-solid fa-book-open"></i> ${category}</span>
            <div class="mantra-text">${m.text.split('\n').slice(0, 4).join('<br>')}</div>
            <div class="mantra-meaning">${previewMeaning}</div>
            <div class="mantra-footer">
                <span class="mantra-name">${displayName}</span>
                <div class="read-arrow">
                    <span class="arrow-icon">→</span>
                    <span class="read-label">${UI[LANG].read}</span>
                </div>
            </div>
        </div>`;
    }).join('');
}

// 🌟 Modal shows BOTH languages always
function openModal(index) {
    const m = mantras[index];
    const name = LANG === 'en' ? m.nameEN : m.nameHI;
    const category = LANG === 'en' ? m.categoryEN.toUpperCase() : m.categoryHI;

    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalCategory').textContent = category;
    document.getElementById('modalMantraText').innerHTML = m.text.replace(/\n/g, '<br>');
    document.getElementById('modalMeaningEN').textContent = m.meaningEN;
    document.getElementById('modalMeaningHI').textContent = m.meaningHI;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    document.getElementById('copyBtn').dataset.mantra = m.text;
    resetCopyBtn();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

function closeModalOnOverlay(event) {
    if (event.target.id === 'modalOverlay') closeModal();
}

function copyMantra() {
    const text = document.getElementById('copyBtn').dataset.mantra;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        document.getElementById('copyBtnText').textContent = UI[LANG].copiedBtn;
        showToast(UI[LANG].toastCopy);
        setTimeout(resetCopyBtn, 2000);
    });
}

function resetCopyBtn() {
    const btn = document.getElementById('copyBtn');
    btn.classList.remove('copied');
    document.getElementById('copyBtnText').textContent = UI[LANG].copyBtn;
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
renderCards();
</script>

<!-- ============ HEADER + FOOTER LOADER ============ -->
<script>
fetch('/header.html')
    .then(res => res.text())
    .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        document.querySelectorAll('#header-placeholder script').forEach(oldScript => {
            const newScript = document.createElement('script');
            newScript.textContent = oldScript.textContent;
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    })
    .catch(err => console.error('Header load failed:', err));

fetch('/footer.html')
    .then(res => res.text())
    .then(html => {
        document.getElementById('footer-placeholder').innerHTML = html;
    })
    .catch(err => console.error('Footer load failed:', err));
</script>

</body>
</html>
